<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Adoção</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <div class="card">
    <div class="card-header">
      <span class="paw">🐾</span>
      <h2>Formulário de Adoção</h2>
      <p>Preencha com cuidado — um animal vai depender de você</p>
    </div>
 
    <div class="card-body">
      <form id="formAdocao">
 
        <div class="section-title">Dados pessoais</div>
 
        <div class="field">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Seu nome completo">
        </div>
 
        <div class="row-2">
          <div class="field">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="seu@email.com">
          </div>
          <div class="field">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000">
          </div>
        </div>
 
        <div class="row-2">
          <div class="field">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00">
          </div>
          <div class="field">
            <label for="idade">Idade</label>
            <input type="number" id="idade" placeholder="Ex: 28" min="0">
          </div>
        </div>
 
        <div class="field">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" placeholder="Sua cidade">
        </div>
 
        <div class="section-title">Moradia</div>
 
        <div class="field">
          <label for="moradia">Tipo de moradia</label>
          <select id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
          </select>
        </div>
 
        <div class="field">
          <label>Possui quintal?</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="quintal" value="sim"> Sim
            </label>
            <label class="radio-option">
              <input type="radio" name="quintal" value="nao"> Não
            </label>
          </div>
        </div>
 
        <div class="section-title">Experiência com animais</div>
 
        <div class="field">
          <label>Já teve pet antes?</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="pet" value="sim"> Sim
            </label>
            <label class="radio-option">
              <input type="radio" name="pet" value="nao"> Não
            </label>
          </div>
        </div>
